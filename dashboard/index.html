<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Agent 檔案管理Log</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .img-thumbnail { object-fit: cover; height: 80px; width: 80px; }
        .table { vertical-align: middle; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5 pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🍵 Tea Agent 檔案管理Log</h2>
            <div class="d-flex align-items-center">
                <label class="me-2 text-nowrap">篩選日期：</label>
                <input type="date" id="dateFilter" class="form-control">
            </div>
        </div>

        <div class="table-responsive shadow-sm rounded bg-white">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 100px;">預覽</th>
                        <th>原始檔名</th>
                        <th>歸檔後名稱</th>
                        <th>判定結果</th>
                        <th>尺寸</th>
                    </tr>
                </thead>
                <tbody id="logTable">
                    <tr><td colspan="5" class="text-center py-5">資料載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const logTable = document.getElementById('logTable');
            const dateFilter = document.getElementById('dateFilter');
            let allData = [];

            // 1. 檢查容器是否存在
            if (!logTable) {
                alert("錯誤：找不到 id='logTable' 的標籤！請檢查 HTML 結構。");
                return;
            }

            // 2. 渲染函式
            function render(data) {
                if (!data || data.length === 0) {
                    logTable.innerHTML = '<tr><td colspan="5" class="text-center py-4">目前尚無相符紀錄</td></tr>';
                    return;
                }
                logTable.innerHTML = data.map(log => `
                    <tr>
                        <td>
                            <img src="${log.thumbnail}" class="img-thumbnail rounded" 
                                 onerror="this.src='https://placehold.co/100x100?text=無圖'">
                        </td>
                        <td class="small text-muted" style="max-width: 250px; word-break: break-all;">${log.original_name}</td>
                        <td class="fw-bold text-primary" style="max-width: 250px; word-break: break-all;">${log.final_name}</td>
                        <td>
                            <span class="badge bg-info text-dark mb-1">${log.activity}</span><br>
                            <span class="badge bg-success">${log.purpose}</span>
                        </td>
                        <td><code class="text-dark small">${log.size}</code></td>
                    </tr>
                `).join('');
            }

            // 3. 抓取資料 (加上 cache buster 防止讀到舊資料)
            fetch('log.json?v=' + Date.now())
                .then(res => res.json())
                .then(data => {
                    allData = data;
                    console.log("✅ 成功讀取 86 筆資料");
                    render(allData);
                })
                .catch(err => {
                    console.error("❌ 讀取失敗:", err);
                    logTable.innerHTML = `<tr><td colspan="5" class="text-danger text-center py-4">載入失敗: ${err.message}</td></tr>`;
                });

            // 4. 日期篩選邏輯
            dateFilter.addEventListener('change', function(e) {
                const selectedDate = e.target.value;
                if (!selectedDate) {
                    render(allData);
                } else {
                    const filtered = allData.filter(log => log.date === selectedDate);
                    render(filtered);
                }
            });
        });
    </script>
</body>
</html>
